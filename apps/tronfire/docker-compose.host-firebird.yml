services:
  firebird:
    profiles:
      - container-firebird-disabled

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FIREBIRD_EXEC_MODE: host
      FIREBIRD: /opt/firebird
      FIREBIRD_BIN: /opt/firebird/bin
      FIREBIRD_LIB: /opt/firebird/lib
      TRONSOFTOS_API_URL: http://host.docker.internal:8080
    volumes:
      - ${FIREBIRD_HOST_ROOT:-/usr/local/firebird}:/usr/local/firebird:ro
      - ${FIREBIRD_HOST_ROOT:-/usr/local/firebird}:/opt/firebird:ro
      - /opt/tronfire-storage/firebird:/firebird
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FIREBIRD_EXEC_MODE: host
      FIREBIRD: /opt/firebird
      FIREBIRD_BIN: /opt/firebird/bin
      FIREBIRD_LIB: /opt/firebird/lib
      TRONSOFTOS_API_URL: http://host.docker.internal:8080
    volumes:
      - ${FIREBIRD_HOST_ROOT:-/usr/local/firebird}:/usr/local/firebird:ro
      - ${FIREBIRD_HOST_ROOT:-/usr/local/firebird}:/opt/firebird:ro
      - /opt/tronfire-storage/firebird:/firebird
      - /proc:/host/proc:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

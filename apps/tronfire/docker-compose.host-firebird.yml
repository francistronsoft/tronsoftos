services:
  firebird:
    profiles:
      - container-firebird-disabled

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FIREBIRD_EXEC_MODE: host
      FIREBIRD_BIN: /usr/local/firebird/bin
      TRONSOFTOS_API_URL: http://host.docker.internal:8080
    volumes:
      - /usr/local/firebird:/usr/local/firebird:ro
      - /usr/local/firebird:/opt/firebird:ro
      - /opt/tronfire-storage/firebird:/firebird
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FIREBIRD_EXEC_MODE: host
      FIREBIRD_BIN: /usr/local/firebird/bin
      TRONSOFTOS_API_URL: http://host.docker.internal:8080
    volumes:
      - /usr/local/firebird:/usr/local/firebird:ro
      - /usr/local/firebird:/opt/firebird:ro
      - /opt/tronfire-storage/firebird:/firebird
      - /proc:/host/proc:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

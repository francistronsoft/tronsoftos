name: troncomanda

services:
  web:
    image: httpd:2.4
    container_name: troncomanda_web
    restart: unless-stopped
    ports:
      - "0.0.0.0:${TRONCOMANDA_WEB_PORT:-8000}:80"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}

  api:
    image: ghcr.io/tronsoft-solucoes/ts-restaurant:main
    container_name: troncomanda_api
    restart: unless-stopped
    ports:
      - "0.0.0.0:${TRONCOMANDA_API_PORT:-9000}:9000"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      SECRET_KEY: ${TRONCOMANDA_SECRET_KEY}
      DATABASE_URL: firebird://${TRONCOMANDA_FIREBIRD_USER:-sysdba}:${TRONCOMANDA_FIREBIRD_PASSWORD:-masterkey}@${TRONCOMANDA_FIREBIRD_HOST:-host.docker.internal}/${TRONCOMANDA_DATABASE_ALIAS:-ERP_TRONSOFT}?charset=${TRONCOMANDA_DATABASE_CHARSET:-win1252}
      STATIC_ASSETS_PATH: /usr/app/public
      STATIC_ASSETS_URL: /qr/public
      TRONCOMANDA_LAN_HOST: ${TRONCOMANDA_LAN_HOST:-}
      PUBLIC_URL: ${TRONCOMANDA_PUBLIC_URL:-}
    volumes:
      - ${TRONCOMANDA_STORAGE_ROOT:-/opt/tronfire-storage/troncomanda}/qr-static:/usr/app/public
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qr:
    image: ghcr.io/tronsoft-solucoes/tron-comanda:main
    container_name: troncomanda_qr
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${TRONCOMANDA_STORAGE_ROOT:-/opt/tronfire-storage/troncomanda}/qr-static:/usr/share/nginx/html/public

  cardapio-lite:
    image: ghcr.io/tronsoft-solucoes/tscardapio-lite:main
    container_name: troncomanda_cardapio_lite
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${TRONCOMANDA_STORAGE_ROOT:-/opt/tronfire-storage/troncomanda}/qr-static:/usr/share/nginx/html/public/img

networks:
  default:
    name: troncomanda_net
